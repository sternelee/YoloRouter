[daemon]
port = 8989
log_level = "info"

# ─── Providers ────────────────────────────────────────────────────────────────
# OAuth providers: token files auto-loaded after running --auth flow once.
# OpenAI-compatible providers: api_key supports ${ENV_VAR} expansion.

# GitHub Copilot Pro+ — tokens stored in ~/.config/yolo-router/github_token
# Setup: yolo-router --auth github
[providers.github_copilot]
type = "github_copilot"

# Codex Plus (ChatGPT Pro) — tokens stored in ~/.config/yolo-router/codex_oauth.json
# Setup: yolo-router --auth codex
[providers.codex_oauth]
type = "codex_oauth"

# OpenRouter — 100+ models, many :free tiers
# Docs: https://openrouter.ai/docs
# Free models: nvidia/nemotron-3-super-120b-a12b:free, openai/gpt-oss-120b:free, minimax/minimax-m2.5:free, google/gemma-4-31b-it:free, qwen/qwen3-coder:free etc.
[providers.openrouter]
type = "openai"
base_url = "https://openrouter.ai/api/v1"
api_key = "${OPENROUTER_API_KEY}"

# NVIDIA NIM — free inference credits for many models
# Docs: https://integrate.api.nvidia.com
# Free Endpoint: minimax-m2.7, step-3.5-flash, glm-4.7, deepseek-v3.2, kimi-k2-thinking etc.
[providers.nvidia]
type = "openai"
base_url = "https://integrate.api.nvidia.com/v1"
api_key = "${NVIDIA_API_KEY}"

# Ollama — local inference, no API key required
# Docs: https://ollama.com  |  Start: ollama serve
# Pull models first: ollama pull qwen2.5-coder:7b  ollama pull llama3.3
[providers.ollama]
type = "openai"
base_url = "http://127.0.0.1:11434/v1"
api_key = "ollama"                    # Ollama ignores the key; any non-empty string works

# ─── Scenarios ────────────────────────────────────────────────────────────────
# Routing priority (highest wins when multiple match):
#   coding(100) > reasoning(90) > chinese(80) > general(50, default)
#
# cost_tier "low"  = tried first (subscription / free quota)
# cost_tier "high" = fallback only (metered / expensive)
#
# Direct routing: set model = "github_copilot:claude-sonnet-4.6" in any client
# to bypass scenario selection entirely.

# ── Coding ────────────────────────────────────────────────────────────────────
[scenarios.coding]
default_tier = "low"
match_task_types = ["coding"]
match_languages = []
priority = 100
is_default = false

[[scenarios.coding.models]]
provider = "github_copilot"
model = "claude-sonnet-4.6"                              # Best all-round coder via Copilot Pro+
cost_tier = "low"
capabilities = ["code", "reasoning", "complex-problems"]

[[scenarios.coding.models]]
provider = "codex_oauth"
model = "gpt-5.3-codex"              # Coding-specialist frontier model via Codex Plus
cost_tier = "low"
capabilities = ["code", "reasoning"]

[[scenarios.coding.models]]
provider = "github_copilot"
model = "gpt-5.4"                    # Latest GPT-5 frontier via Copilot Pro+
cost_tier = "low"
capabilities = ["code", "reasoning"]

[[scenarios.coding.models]]
provider = "codex_oauth"
model = "gpt-5.4"                    # Latest GPT-5 frontier via Codex Plus
cost_tier = "low"
capabilities = ["code", "reasoning"]

[[scenarios.coding.models]]
provider = "openrouter"
model = "qwen/qwen3-coder:free"                          # Coding-specialist; free OpenRouter quota
cost_tier = "low"
capabilities = ["code"]

[[scenarios.coding.models]]
provider = "nvidia"
model = "deepseek-v3.2"                                  # Strong at code + reasoning; free NIM credits
cost_tier = "low"
capabilities = ["code", "reasoning"]

[[scenarios.coding.models]]
provider = "ollama"
model = "qwen2.5-coder:7b"                               # Local — pull with: ollama pull qwen2.5-coder:7b
cost_tier = "low"
capabilities = ["code"]

[[scenarios.coding.models]]
provider = "github_copilot"
model = "claude-opus-4.6"                                # Highest quality — only if lower tiers fail
cost_tier = "high"
capabilities = ["code", "reasoning", "complex-problems"]

# ── Reasoning / Analysis ──────────────────────────────────────────────────────
[scenarios.reasoning]
default_tier = "low"
match_task_types = ["reasoning", "analysis"]
match_languages = []
priority = 90
is_default = false

[[scenarios.reasoning.models]]
provider = "github_copilot"
model = "claude-sonnet-4.6"
cost_tier = "low"
capabilities = ["reasoning", "analysis"]

[[scenarios.reasoning.models]]
provider = "codex_oauth"
model = "gpt-5.4"
cost_tier = "low"
capabilities = ["reasoning"]

[[scenarios.reasoning.models]]
provider = "nvidia"
model = "kimi-k2-thinking"                               # Chain-of-thought specialist; free NIM credits
cost_tier = "low"
capabilities = ["reasoning", "analysis"]

[[scenarios.reasoning.models]]
provider = "openrouter"
model = "nvidia/nemotron-3-super-120b-a12b:free"         # 120B reasoning; free OpenRouter quota
cost_tier = "low"
capabilities = ["reasoning", "analysis"]

[[scenarios.reasoning.models]]
provider = "nvidia"
model = "deepseek-v3.2"                                  # Strong reasoning; free NIM credits
cost_tier = "low"
capabilities = ["reasoning", "analysis"]

[[scenarios.reasoning.models]]
provider = "openrouter"
model = "openai/gpt-oss-120b:free"                       # 120B general; free OpenRouter quota
cost_tier = "low"
capabilities = ["reasoning"]

# ── CJK / Chinese ─────────────────────────────────────────────────────────────
[scenarios.chinese]
default_tier = "low"
match_task_types = []     # any task type, trigger on language only
match_languages = ["cjk"]
priority = 80
is_default = false

[[scenarios.chinese.models]]
provider = "github_copilot"
model = "claude-sonnet-4.6"
cost_tier = "low"
capabilities = ["multilingual", "reasoning"]

[[scenarios.chinese.models]]
provider = "nvidia"
model = "glm-4.7"                                        # Zhipu/Tsinghua Chinese-first; free NIM credits
cost_tier = "low"
capabilities = ["multilingual", "reasoning"]

[[scenarios.chinese.models]]
provider = "nvidia"
model = "minimax-m2.7"                                   # MiniMax latest, Chinese-friendly; free NIM credits
cost_tier = "low"
capabilities = ["multilingual"]

[[scenarios.chinese.models]]
provider = "openrouter"
model = "minimax/minimax-m2.5:free"                      # MiniMax via OpenRouter; free quota
cost_tier = "low"
capabilities = ["multilingual"]

# ── General / Creative / Translation (default) ────────────────────────────────
[scenarios.general]
default_tier = "low"
match_task_types = ["general", "creative", "translation"]
match_languages = []
priority = 50
is_default = true                                         # catch-all when no other scenario matches

[[scenarios.general.models]]
provider = "github_copilot"
model = "claude-haiku-4.5"  # Lightweight Haiku-4.5 via Copilot Pro+
cost_tier = "low"

[[scenarios.general.models]]
provider = "codex_oauth"
model = "gpt-5.4-mini"   # Lightweight GPT-5 via Codex Plus
cost_tier = "low"

[[scenarios.general.models]]
provider = "openrouter"
model = "openai/gpt-oss-120b:free"                       # 120B general; free OpenRouter quota
cost_tier = "low"

[[scenarios.general.models]]
provider = "openrouter"
model = "google/gemma-4-31b-it:free"                     # Google Gemma 4; free OpenRouter quota
cost_tier = "low"

[[scenarios.general.models]]
provider = "nvidia"
model = "step-3.5-flash"                                 # Lightweight/fast; free NIM credits
cost_tier = "low"

[[scenarios.general.models]]
provider = "ollama"
model = "llama3.3:latest"                                # Local — pull with: ollama pull llama3.3
cost_tier = "low"

# ─── Routing ──────────────────────────────────────────────────────────────────

[routing]
fallback_enabled = true
timeout_ms = 30000
retry_count = 2
confidence_threshold = 0.6
# Skip a failed provider for this many seconds before retrying it (0 = disabled)
cooldown_enabled = true
cooldown_secs = 10800
