[daemon]
port = 8080
log_level = "info"

# ─── Provider Configuration ───────────────────────────────────────────────────
# api_key supports ${ENV_VAR} expansion

# ── Free / cheap models via OpenRouter ──────────────────────────────────────
# Sign up at https://openrouter.ai and set OPENROUTER_API_KEY
[providers.openrouter]
type = "openai"
base_url = "https://openrouter.ai/api/v1"
api_key = "${OPENROUTER_API_KEY}"

# ── GitHub Copilot (free with Pro subscription) ───────────────────────────
# Run: yolo-router --auth github
# Token auto-loaded from ~/.config/yolo-router/github_token
[providers.github_copilot]
type = "github_copilot"
# token is optional here — loaded from disk after --auth github
# token = "${GITHUB_COPILOT_TOKEN}"

# ── ChatGPT Pro via Codex OAuth (free with ChatGPT Pro subscription) ──────
# Run: yolo-router --auth codex
# Tokens auto-loaded from ~/.config/yolo-router/codex_oauth.json
[providers.codex_oauth]
type = "codex_oauth"
# (no api_key needed — tokens loaded from disk after --auth codex)

# ── Paid API providers (optional fallbacks) ───────────────────────────────
[providers.anthropic]
type = "anthropic"
api_key = "${ANTHROPIC_API_KEY}"

[providers.openai]
type = "openai"
api_key = "${OPENAI_API_KEY}"

[providers.gemini]
type = "gemini"
api_key = "${GEMINI_API_KEY}"

# ─── Scenarios ────────────────────────────────────────────────────────────────
# Each scenario matches requests by task type + language, then tries models in
# order with automatic fallback.
#
# match_task_types: ["coding","reasoning","analysis","translation","creative","general"]
# match_languages:  ["latin","cjk","code","mixed"]  (empty = match any)
# priority:         higher = preferred when multiple scenarios match
# is_default:       true = use when no other scenario matches
#
# TUI override: yolo-router --tui → Scenarios tab → Enter to pin a scenario

# ── Coding: GitHub Copilot → Codex → paid fallbacks ───────────────────────
[scenarios.coding]
default_tier = "low"
match_task_types = ["coding"]
match_languages = []          # match any language
priority = 100
is_default = false

[[scenarios.coding.models]]
provider = "github_copilot"
model = "claude-sonnet-4-6"   # Claude Sonnet 4.6 via Copilot Pro
cost_tier = "low"
capabilities = ["code", "reasoning", "complex-problems"]

[[scenarios.coding.models]]
provider = "github_copilot"
model = "gpt-4o"              # GPT-4o via Copilot Pro
cost_tier = "low"
capabilities = ["code", "reasoning"]

[[scenarios.coding.models]]
provider = "codex_oauth"
model = "gpt-5.4"             # GPT-5.4 via ChatGPT Pro subscription
cost_tier = "low"
capabilities = ["code", "reasoning"]

[[scenarios.coding.models]]
provider = "codex_oauth"
model = "codex-davinci-002"   # Codex classic (fallback)
cost_tier = "low"
capabilities = ["code"]

[[scenarios.coding.models]]
provider = "anthropic"
model = "claude-opus-4-5"     # Paid fallback if subscriptions unavailable
cost_tier = "high"
capabilities = ["reasoning", "code", "complex-problems"]

# ── Reasoning / analysis: prefer premium models ───────────────────────────
[scenarios.reasoning]
default_tier = "low"
match_task_types = ["reasoning", "analysis"]
match_languages = []
priority = 90
is_default = false

[[scenarios.reasoning.models]]
provider = "github_copilot"
model = "claude-sonnet-4-6"
cost_tier = "low"
capabilities = ["reasoning", "analysis"]

[[scenarios.reasoning.models]]
provider = "codex_oauth"
model = "gpt-5.4"
cost_tier = "low"
capabilities = ["reasoning"]

[[scenarios.reasoning.models]]
provider = "openrouter"
model = "deepseek/deepseek-r1:free"
cost_tier = "low"
capabilities = ["reasoning"]

# ── CJK / Chinese requests ────────────────────────────────────────────────
[scenarios.chinese]
default_tier = "low"
match_task_types = []         # match any task
match_languages = ["cjk"]     # Chinese/Japanese/Korean requests
priority = 80
is_default = false

[[scenarios.chinese.models]]
provider = "github_copilot"
model = "claude-sonnet-4-6"
cost_tier = "low"
capabilities = ["multilingual", "reasoning"]

[[scenarios.chinese.models]]
provider = "openrouter"
model = "qwen/qwen-2.5-72b-instruct:free"
cost_tier = "low"
capabilities = ["multilingual", "cjk"]

[[scenarios.chinese.models]]
provider = "gemini"
model = "gemini-2.0-flash"
cost_tier = "low"
capabilities = ["multilingual"]

# ── General / simple tasks: free OpenRouter models ────────────────────────
[scenarios.general]
default_tier = "low"
match_task_types = ["general", "creative", "translation"]
match_languages = []
priority = 50
is_default = true             # fallback when no other scenario matches

[[scenarios.general.models]]
provider = "openrouter"
model = "meta-llama/llama-3.1-8b-instruct:free"
cost_tier = "low"

[[scenarios.general.models]]
provider = "openrouter"
model = "mistralai/mistral-7b-instruct:free"
cost_tier = "low"

[[scenarios.general.models]]
provider = "openrouter"
model = "google/gemma-2-9b-it:free"
cost_tier = "low"

[[scenarios.general.models]]
provider = "github_copilot"  # Copilot as last-resort if OpenRouter quota hit
model = "gpt-4o-mini"
cost_tier = "low"

# ─── Routing ─────────────────────────────────────────────────────────────────

[routing]
fallback_enabled = true
timeout_ms = 30000
retry_count = 2
# Minimum analyzer confidence to use auto-routing (0.0–1.0)
# Below this threshold, the default scenario is used instead
confidence_threshold = 0.6

