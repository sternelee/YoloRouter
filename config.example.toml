[daemon]
port = 8080
log_level = "info"

# ─── Provider Configuration ───────────────────────────────────────────────────
# api_key supports ${ENV_VAR} expansion

[providers.anthropic]
type = "anthropic"
api_key = "${ANTHROPIC_API_KEY}"

[providers.openai]
type = "openai"
api_key = "${OPENAI_API_KEY}"

[providers.gemini]
type = "gemini"
api_key = "${GEMINI_API_KEY}"

# GitHub Copilot — obtain token via: yolo-router auth github
[providers.github_copilot]
type = "github_copilot"
token = "${GITHUB_TOKEN}"
# Optional: override the OAuth client_id (defaults to community client id)
# client_id = "Iv1.b507a08c87ecfe98"

# OpenAI Codex (standard endpoint)
[providers.codex]
type = "codex"
api_key = "${OPENAI_API_KEY}"

# Azure OpenAI example
# [providers.azure]
# type = "codex"
# api_key = "${AZURE_OPENAI_API_KEY}"
# azure_endpoint = "https://your-resource.openai.azure.com"
# api_version = "2024-02-01"

# ─── Scenarios ────────────────────────────────────────────────────────────────
# Each scenario matches requests by task type + language, then tries models in
# order with automatic fallback.
#
# match_task_types: ["coding","reasoning","analysis","translation","creative","general"]
# match_languages:  ["latin","cjk","code","mixed"]  (empty = match any)
# priority:         higher = preferred when multiple scenarios match
# is_default:       true = use when no other scenario matches

[scenarios.coding]
default_tier = "high"
match_task_types = ["coding"]
match_languages = []          # match any language
priority = 100
is_default = false

[[scenarios.coding.models]]
provider = "anthropic"
model = "claude-opus-4-5"
cost_tier = "high"
capabilities = ["reasoning", "code", "complex-problems"]

[[scenarios.coding.models]]
provider = "openai"
model = "gpt-4o"
cost_tier = "high"
capabilities = ["code", "reasoning"]

[[scenarios.coding.models]]
provider = "github_copilot"
model = "gpt-4o"
cost_tier = "low"
capabilities = ["code"]

[[scenarios.coding.models]]
provider = "openai"
model = "gpt-4o-mini"
cost_tier = "low"
capabilities = ["code"]

[scenarios.reasoning]
default_tier = "high"
match_task_types = ["reasoning", "analysis"]
match_languages = []
priority = 90
is_default = false

[[scenarios.reasoning.models]]
provider = "anthropic"
model = "claude-opus-4-5"
cost_tier = "high"
capabilities = ["reasoning", "analysis"]

[[scenarios.reasoning.models]]
provider = "openai"
model = "o1-mini"
cost_tier = "high"
capabilities = ["reasoning"]

[[scenarios.reasoning.models]]
provider = "anthropic"
model = "claude-sonnet-4-5"
cost_tier = "medium"
capabilities = ["reasoning"]

[scenarios.chinese]
default_tier = "medium"
match_task_types = []         # match any task
match_languages = ["cjk"]     # Chinese/Japanese/Korean requests
priority = 80
is_default = false

[[scenarios.chinese.models]]
provider = "anthropic"
model = "claude-sonnet-4-5"
cost_tier = "medium"
capabilities = ["reasoning", "multilingual"]

[[scenarios.chinese.models]]
provider = "openai"
model = "gpt-4o"
cost_tier = "high"
capabilities = ["multilingual"]

[[scenarios.chinese.models]]
provider = "gemini"
model = "gemini-2.0-flash"
cost_tier = "low"
capabilities = ["multilingual"]

[scenarios.general]
default_tier = "low"
match_task_types = ["general", "creative", "translation"]
match_languages = []
priority = 50
is_default = true             # fallback when no other scenario matches

[[scenarios.general.models]]
provider = "openai"
model = "gpt-4o-mini"
cost_tier = "low"

[[scenarios.general.models]]
provider = "anthropic"
model = "claude-haiku-4-5"
cost_tier = "low"

[[scenarios.general.models]]
provider = "gemini"
model = "gemini-2.0-flash"
cost_tier = "low"

# ─── Routing ─────────────────────────────────────────────────────────────────

[routing]
fallback_enabled = true
timeout_ms = 30000
retry_count = 2
# Minimum analyzer confidence to use auto-routing (0.0–1.0)
# Below this threshold, the default scenario is used instead
confidence_threshold = 0.6

