name: Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  CARGO_TERM_COLOR: always

jobs:
  build-matrix:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: yolo-router
            asset_name: yolo-router-linux-amd64

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: yolo-router
            asset_name: yolo-router-darwin-amd64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: yolo-router
            asset_name: yolo-router-darwin-arm64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: yolo-router.exe
            asset_name: yolo-router-windows-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ -f "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" ]; then
            strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" || true
          fi

      - name: Test binary (sanity check)
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            target/${{ matrix.target }}/release/${{ matrix.artifact_name }} --version || true
          else
            ./target/${{ matrix.target }}/release/${{ matrix.artifact_name }} --version || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}${{ runner.os == 'Windows' && '.exe' || '' }}
          retention-days: 30
